<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividend Portfolio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-emerald-700 tracking-tight flex items-center gap-2">💰 Dividend Tracker</h1>
                <p id="appSubtitle" class="text-slate-500 mt-1">Laden...</p>
            </div>
            <div id="modeBadge" class="text-xs font-bold px-3 py-1 rounded-full shadow-xs"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Active Shares</span>
                <p id="kpiTotalShares" class="text-2xl font-bold text-slate-800 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Current PADI</span>
                <p id="kpiCurrentPadi" class="text-2xl font-bold text-emerald-600 mt-1">$0.00</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Annual Goal</span>
                <p id="kpiTargetPadi" class="text-2xl font-bold text-blue-600 mt-1">$0.00</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Overall Progress</span>
                <p id="kpiProgress" class="text-2xl font-bold text-amber-600 mt-1">0%</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                <h3 class="text-md font-bold text-slate-700 mb-4">📈 Current vs. Target Income (Per Asset)</h3>
                <div class="h-64 flex items-center justify-center">
                    <canvas id="targetVsCurrentChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                <h3 class="text-md font-bold text-slate-700 mb-4">🗓️ Projected Monthly Income Payout Matrix</h3>
                <div class="h-64 flex items-center justify-center">
                    <canvas id="monthlyCalendarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div id="adminPanel" class="space-y-6 hidden">
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs">
                    <h2 id="formTitle" class="text-xl font-bold mb-4 text-slate-700">Add New Position</h2>
                    <form id="stockForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-600">Stock/ETF Name</label>
                            <input type="text" id="stockName" required placeholder="e.g., iShares Core S&P 500" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-600">Ticker Symbol</label>
                                <input type="text" id="ticker" required placeholder="e.g., VUSA.AS" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800 uppercase">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-600">Payout Frequency</label>
                                <select id="frequency" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800">
                                    <option value="4">Quarterly (4x)</option>
                                    <option value="12">Monthly (12x)</option>
                                    <option value="2">Semi-Annual (2x)</option>
                                    <option value="1">Annual (1x)</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-600">Shares Quantity</label>
                                <input type="number" step="any" id="sharesCount" required placeholder="e.g., 25" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-600">Estimated Annual Div</label>
                                <input type="number" step="any" id="currentDiv" required placeholder="e.g., 4.50" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-600">Annual Dividend Goal ($)</label>
                            <input type="number" step="any" id="dividendGoal" required placeholder="e.g., 500.00" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800">
                        </div>

                        <div class="space-y-2 pt-2">
                            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-xs cursor-pointer">
                                Save Position
                            </button>
                            <button type="button" id="cancelEditBtn" onclick="resetFormState()" class="w-full hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-2 rounded-lg transition duration-200 cursor-pointer">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="ledgerContainer" class="lg:col-span-3 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-700">Asset Overview</h2>
                    <span id="assetCount" class="bg-white text-slate-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-slate-100 shadow-xs">0 Assets Tracked</span>
                </div>
                
                <div id="portfolioList" class="space-y-3">
                    <div id="emptyState" class="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200 text-slate-400">
                        <span class="text-4xl">💼</span>
                        <p class="mt-2 text-sm">Your dividend portfolio is empty.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'ja';

        // App Reactive State
        let assets = JSON.parse(localStorage.getItem('dividendPortfolio')) || [];
        let editIndex = null;

        // Global Chart Registry Objects
        let comparisonChartInstance = null;
        let calendarChartInstance = null;

        // UI DOM Access Selection
        const adminPanel = document.getElementById('adminPanel');
        const ledgerContainer = document.getElementById('ledgerContainer');
        const appSubtitle = document.getElementById('appSubtitle');
        const modeBadge = document.getElementById('modeBadge');
        const stockForm = document.getElementById('stockForm');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const portfolioList = document.getElementById('portfolioList');
        const emptyState = document.getElementById('emptyState');
        const assetCount = document.getElementById('assetCount');

        // --- IDENTITY ROUTING (VIEWER vs ADMINISTRATIVE MANAGER) ---
        if (isAdmin) {
            adminPanel.classList.remove('hidden');
            ledgerContainer.classList.replace('lg:col-span-3', 'lg:col-span-2');
            appSubtitle.textContent = "Manage equity shares, annual income payout metrics, and target yields.";
            modeBadge.textContent = "🛠️ PORTFOLIO MANAGER";
            modeBadge.className = "text-xs font-bold px-3 py-1 rounded-full bg-purple-100 text-purple-800 shadow-xs";
        } else {
            appSubtitle.textContent = "Real-time read-only monitoring of yield timelines and targets.";
            modeBadge.textContent = "👀 VIEWER DASHBOARD";
            modeBadge.className = "text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-600 shadow-xs";
        }

        // --- CORE COMPUTATIONAL ENGINE & KPIS ---
        function calculateMetrics() {
            let totalShares = 0;
            let currentPadiSum = 0;
            let targetPadiSum = 0;

            assets.forEach(asset => {
                const totalAnnualValue = Number(asset.sharesCount) * Number(asset.currentDiv);
                totalShares += Number(asset.sharesCount);
                currentPadiSum += totalAnnualValue;
                targetPadiSum += Number(asset.dividendGoal);
            });

            document.getElementById('kpiTotalShares').textContent = totalShares.toLocaleString(undefined, {maximumFractionDigits: 2});
            document.getElementById('kpiCurrentPadi').textContent = `$${currentPadiSum.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('kpiTargetPadi').textContent = `$${targetPadiSum.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            const progressRatio = targetPadiSum > 0 ? (currentPadiSum / targetPadiSum) * 100 : 0;
            document.getElementById('kpiProgress').textContent = `${progressRatio.toFixed(1)}%`;
        }

        // --- GRAPHICS DATA VISUALIZATION LAYER ---
        function renderCharts() {
            if (comparisonChartInstance) comparisonChartInstance.destroy();
            if (calendarChartInstance) calendarChartInstance.destroy();

            const labels = assets.map(a => a.ticker.toUpperCase());
            const currentData = assets.map(a => Number(a.sharesCount) * Number(a.currentDiv));
            const targetData = assets.map(a => Number(a.dividendGoal));

            // Chart 1 Generator: Target vs Current
            const ctx1 = document.getElementById('targetVsCurrentChart').getContext('2d');
            comparisonChartInstance = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Current Income', data: currentData, backgroundColor: '#10b981' },
                        { label: 'Target Goal', data: targetData, backgroundColor: '#3b82f6' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } }, 
                        x: { ticks: { color: '#64748b' } } 
                    },
                    plugins: { legend: { labels: { color: '#334155' } } }
                }
            });

            // Chart 2 Generator: Monthly Distribution Timelines
            let monthlyDistribution = Array(12).fill(0);
            assets.forEach(asset => {
                const annualizedCash = Number(asset.sharesCount) * Number(asset.currentDiv);
                const paymentCount = Number(asset.frequency);
                const payoutPerPeriod = annualizedCash / paymentCount;

                if (paymentCount === 12) {
                    for (let m = 0; m < 12; m++) monthlyDistribution[m] += payoutPerPeriod;
                } else if (paymentCount === 4) {
                    [0, 3, 6, 9].forEach(m => monthlyDistribution[m] += payoutPerPeriod);
                } else if (paymentCount === 2) {
                    [5, 11].forEach(m => monthlyDistribution[m] += payoutPerPeriod);
                } else {
                    monthlyDistribution[11] += payoutPerPeriod;
                }
            });

            const ctx2 = document.getElementById('monthlyCalendarChart').getContext('2d');
            calendarChartInstance = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [{
                        label: 'Projected Cashflow',
                        data: monthlyDistribution,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.05)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } }, 
                        x: { ticks: { color: '#64748b' } } 
                    },
                    plugins: { legend: { labels: { color: '#334155' } } }
                }
            });
        }

        // --- LEDGER DISPLAY DRAW ROUTINES ---
        function renderPortfolio() {
            document.querySelectorAll('.asset-card').forEach(card => card.remove());

            if (assets.length === 0) {
                emptyState.style.display = 'block';
                assetCount.textContent = "0 Assets Tracked";
                calculateMetrics();
                renderCharts();
                return;
            }

            emptyState.style.display = 'none';
            assetCount.textContent = `${assets.length} Asset${assets.length !== 1 ? 's' : ''} Tracked`;

            assets.forEach((asset, idx) => {
                const totalCurrentAnnualValue = Number(asset.sharesCount) * Number(asset.currentDiv);
                const goalProgressPercent = (totalCurrentAnnualValue / Number(asset.dividendGoal)) * 100;

                const card = document.createElement('div');
                card.className = "asset-card p-5 rounded-2xl bg-white border border-slate-100 shadow-xs flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition hover:shadow-md";
                
                let managementActions = '';
                if (isAdmin) {
                    managementActions = `
                        <div class="flex gap-2 w-full md:w-auto justify-end">
                            <button onclick="startEditAsset(${idx})" class="px-3 py-1.5 text-xs bg-amber-50 text-amber-700 hover:bg-amber-100 rounded-lg border border-amber-200 transition cursor-pointer">✏️ Edit</button>
                            <button onclick="deleteAsset(${idx})" class="px-3 py-1.5 text-xs bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg border border-rose-200 transition cursor-pointer">🗑_ Delete</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="bg-emerald-50 text-emerald-700 text-xs font-bold px-2 py-0.5 rounded-md border border-emerald-200 uppercase">${asset.ticker}</span>
                            <span class="text-slate-400 text-xs font-medium">Freq: ${asset.frequency}x/year</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mt-1">${asset.stockName}</h3>
                        
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3 pt-3 border-t border-slate-100 text-sm">
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400">Shares Owned</span>
                                <span class="font-semibold text-slate-700">${Number(asset.sharesCount).toLocaleString()}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400">Est. Payout / Share</span>
                                <span class="font-semibold text-slate-700">$${Number(asset.currentDiv).toFixed(2)}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400">Current PADI</span>
                                <span class="font-semibold text-emerald-600">$${totalCurrentAnnualValue.toFixed(2)}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400">Goal Target</span>
                                <span class="font-semibold text-blue-600">$${Number(asset.dividendGoal).toFixed(2)}</span>
                            </div>
                        </div>

                        <div class="w-full bg-slate-100 rounded-full h-1.5 mt-3 overflow-hidden">
                            <div class="bg-gradient-to-r from-emerald-500 to-teal-400 h-1.5 rounded-full" style="width: ${Math.min(goalProgressPercent, 100)}%"></div>
                        </div>
                        <span class="text-[10px] text-slate-400 mt-1 block">Goal Milestone Progress: ${goalProgressPercent.toFixed(1)}%</span>
                    </div>
                    ${managementActions}
                `;
                portfolioList.appendChild(card);
            });

            calculateMetrics();
            renderCharts();
        }

        // --- SUBMISSION WRITE INTERACTION LOGICS ---
        if (isAdmin) {
            stockForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const payload = {
                    stockName: document.getElementById('stockName').value.trim(),
                    ticker: document.getElementById('ticker').value.trim().toUpperCase(),
                    frequency: document.getElementById('frequency').value,
                    sharesCount: document.getElementById('sharesCount').value,
                    currentDiv: document.getElementById('currentDiv').value,
                    dividendGoal: document.getElementById('dividendGoal').value
                };

                if (editIndex !== null) {
                    assets[editIndex] = payload;
                    editIndex = null;
                } else {
                    assets.push(payload);
                }

                localStorage.setItem('dividendPortfolio', JSON.stringify(assets));
                renderPortfolio();
                resetFormState();
            });

            window.startEditAsset = function(idx) {
                editIndex = idx;
                const asset = assets[idx];

                document.getElementById('stockName').value = asset.stockName;
                document.getElementById('ticker').value = asset.ticker;
                document.getElementById('frequency').value = asset.frequency;
                document.getElementById('sharesCount').value = asset.sharesCount;
                document.getElementById('currentDiv').value = asset.currentDiv;
                document.getElementById('dividendGoal').value = asset.dividendGoal;

                formTitle.textContent = "Modify Asset Position";
                submitBtn.textContent = "Update Position Info";
                submitBtn.className = "w-full bg-amber-600 hover:bg-amber-700 text-white font-medium py-2.5 rounded-lg transition duration-200 cursor-pointer shadow-xs";
                cancelEditBtn.classList.remove('hidden');

                adminPanel.scrollIntoView({ behavior: 'smooth' });
            };

            window.deleteAsset = function(idx) {
                if (confirm(`Are you completely sure you want to remove ${assets[idx].ticker}?`)) {
                    if (editIndex === idx) resetFormState();
                    assets.splice(idx, 1);
                    localStorage.setItem('dividendPortfolio', JSON.stringify(assets));
                    renderPortfolio();
                }
            };
        }

        window.resetFormState = function() {
            editIndex = null;
            stockForm.reset();
            formTitle.textContent = "Add New Position";
            submitBtn.textContent = "Save Position";
            submitBtn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition duration-200 cursor-pointer shadow-xs";
            cancelEditBtn.classList.add('hidden');
        };

        // Initialize App UI Run
        renderPortfolio();
    </script>
</body>
</html>
